stages:
  data_ingestion:
    cmd: python src/data/data_ingestion.py
    deps:
    - src/data/data_ingestion.py
    params:
    - data_ingestion.data_url
    - data_ingestion.file_name
    - data_ingestion.raw_data_path
    outs:
    - data/raw

  data_preprocessing:
    cmd: python src/data/data_preprocessing.py
    deps:
    - data/raw
    - src/data/data_preprocessing.py
    params:
    - data_preprocessing.test_size
    - data_preprocessing.val_size
    - data_preprocessing.random_state
    - data_preprocessing.target_column
    - data_preprocessing.columns  
    outs:
    - data/interim

  model_building:
    cmd: python src/model/model_building.py
    deps:
    - data/interim
    - src/model/model_building.py
    params:
    - model_building.target_column
    - model_building.penalty
    - model_building.solver
    - model_building.C
    - model_building.class_weight  
    - model_building.random_state  
    outs:
    - models/model_artifact.pkl

  model_evaluation:
    cmd: python src/model/model_evaluation.py
    deps:
    - models/model_artifact.pkl
    - src/model/model_evaluation.py
    params:
    - model_evaluation.target_column
    metrics:
    - reports/metrics.json
    outs:
    - reports/experiment_info.json

  model_registeration:
    cmd: python src/model/model_registeration.py
    deps:
    - reports/experiment_info.json
    - src/model/model_registeration.py


